<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Werwolf" />
  <meta name="theme-color" content="#0f0f1a" />
  <meta name="description" content="Moderationsapp für das Werwolf Kartenspiel" />

  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <link rel="stylesheet" href="./css/styles.css" />

  <title>Werwolf Moderator</title>
  <style>
    #splash {
      position: fixed; inset: 0;
      background: #0f0f1a;
      display: flex; align-items: center; justify-content: center;
      z-index: 99997;
      transition: opacity 0.45s ease;
      padding-top: env(safe-area-inset-top, 0px);
    }
    #splash.fade-out { opacity: 0; pointer-events: none; }
    #splash-inner { text-align: center; }
    #splash-inner img {
      width: 108px; height: 108px;
      border-radius: 24px;
      box-shadow: 0 0 48px rgba(124,58,237,0.45);
    }
    #splash-title {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 1.5rem; font-weight: 800;
      color: #e2e8f0; margin-top: 18px; letter-spacing: -0.3px;
    }
    #splash-sub {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 0.82rem; color: #475569; margin-top: 5px;
    }
  </style>
</head>
<body>
  <div id="splash">
    <div id="splash-inner">
      <img src="./icons/icon-192.png" alt="" />
      <div id="splash-title">Werwolf</div>
      <div id="splash-sub">Moderator</div>
    </div>
  </div>
  <div id="app"></div>
  <div id="err" style="display:none;position:fixed;inset:0;background:#1a0000;color:#ff6b6b;padding:20px;font-family:monospace;font-size:13px;z-index:99999;overflow:auto;white-space:pre-wrap"></div>
  <script>
    window.onerror = function(msg, src, line, col, err) {
      var d = document.getElementById('err');
      d.style.display = 'block';
      d.textContent = 'ERROR:\n' + msg + '\n\nFile: ' + src + '\nLine: ' + line + '\n\n' + (err && err.stack ? err.stack : '');
    };
    window.addEventListener('unhandledrejection', function(e) {
      var d = document.getElementById('err');
      d.style.display = 'block';
      d.textContent += '\nPromise Error:\n' + (e.reason && e.reason.stack ? e.reason.stack : String(e.reason));
    });
  </script>
  <script type="module" src="./js/app.js"></script>
</body>
</html>
